<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>スペイン語 2-1</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            line-height: 1.8;
        }
        h1 {
            text-align: center;
        }
        button {
            padding: 10px 15px;
            font-size: 15px;
            margin: 5px;
            cursor: pointer;
            border-radius: 6px;
            border: 1px solid #888;
            background-color: #f8f8f8;
        }
        button:hover {
            background-color: #e6e6e6;
        }
        input {
            margin-left: 10px;
            padding: 5px;
            font-size: 16px;
            width: 160px;
        }
        .question {
            margin-bottom: 15px;
        }
        .choice-btn.selected {
            background-color: #4a90e2;
            color: white;
            font-weight: bold;
        }
        .correct { color: green; }
        .incorrect { color: red; }
        #result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>
<h1>スペイン語 1-2 演習</h1>

<button onclick="generateQuiz()">問題を生成する</button>
<form id="quizForm"></form>
<button onclick="gradeQuiz()">正答を判定する</button>

<div id="result"></div>
<p><a href="../spanish.html">← 目次へ戻る</a></p>

<script>
/* ---------------- アルファベット ---------------- */
const alphabetQuestions = [
    { letter: "A", answer: "a" },
    { letter: "B", answer: "be" },
    { letter: "C", answer: "ce" },
    { letter: "D", answer: "de" },
    { letter: "E", answer: "e" },
    { letter: "F", answer: "efe" },
    { letter: "G", answer: "ge" },
    { letter: "H", answer: "hache" },
    { letter: "I", answer: "i" },
    { letter: "J", answer: "jota" },
    { letter: "K", answer: "ka" },
    { letter: "L", answer: "ele" },
    { letter: "M", answer: "eme" },
    { letter: "N", answer: "ene" },
    { letter: "Ñ", answer: "eñe" },
    { letter: "O", answer: "o" },
    { letter: "P", answer: "pe" },
    { letter: "Q", answer: "cu" },
    { letter: "R", answer: "ere" },
    { letter: "S", answer: "ese" },
    { letter: "T", answer: "te" },
    { letter: "U", answer: "u" },
    { letter: "V", answer: "uve" },
    { letter: "W", answer: "uve doble" },
    { letter: "X", answer: "equis" },
    { letter: "Y", answer: "ye" },
    { letter: "Z", answer: "zeta" }
];

/* ---------------- 問題2(1) 二重母音なし ---------------- */
const noDiphthongQuestions = [
    { correct: "casa", options: ["casa", "aire", "cielo", "bueno"] },
    { correct: "mesa", options: ["mesa", "tierra", "nuevo", "fuego"] },
    { correct: "libro", options: ["libro", "reina", "ciudad", "cielo"] },
    { correct: "gato", options: ["gato", "huevo", "aire", "suelo"] },
    { correct: "vino", options: ["vino", "peine", "causa", "nueve"] },
    { correct: "padre", options: ["padre", "buey", "europa", "viejo"] },
    { correct: "perro", options: ["perro", "cielo", "rueda", "cuatro"] },
    { correct: "carta", options: ["carta", "deuda", "vuelve", "nuevo"] },
    { correct: "silla", options: ["silla", "tierra", "aire", "fuego"] },
    { correct: "amigo", options: ["amigo", "ciudad", "peine", "huevo"] }
];

/* ---------------- 問題2(2) 二重子音なし ---------------- */
const noClusterQuestions = [
    { correct: "casa", options: ["casa", "plaza", "tren", "blanco"] },
    { correct: "mesa", options: ["mesa", "flor", "prado", "clase"] },
    { correct: "amigo", options: ["amigo", "plato", "brisa", "grito"] },
    { correct: "gato", options: ["gato", "fruta", "crudo", "globo"] },
    { correct: "vino", options: ["vino", "bravo", "pluma", "claro"] },
    { correct: "familia", options: ["familia", "tren", "plato", "grano"] },
    { correct: "cocina", options: ["cocina", "flor", "brisa", "cráneo"] },
    { correct: "domingo", options: ["domingo", "prado", "blusa", "clase"] },
    { correct: "piano", options: ["piano", "plaza", "grito", "fruta"] },
];

/* ---------------- 挨拶 ---------------- */
const greetingQuestions = [
    { spanish: "Hola.", answer: "こんにちは。（１日中）" },
    { spanish: "Buenos dias.", answer: "おはようございます" },
    { spanish: "Buenos tardes.", answer: "こんにちは（昼食後）" },
    { spanish: "Buenos noches.", answer: "こんばんは" },
    { spanish: "Hasta luego.", answer: "また後で" },
    { spanish: "Adios.", answer: "さようなら" },
    { spanish: "?Que tal?", answer: "元気？" },
    { spanish: "Gracias.", answer: "ありがとう" },
    { spanish: "De nada.", answer: "どういたしまして" },
    { spanish: "Lo siento.", answer: "申し訳ありません" },
    { spanish: "Si.", answer: "はい" },
    { spanish: "No.", answer: "いいえ" },
    { spanish: "Encantado.", answer: "初めまして（男性）" },
    { spanish: "Encantada.", answer: "初めまして（女性）" },
    { spanish: "Mucho gusto.", answer: "初めまして（男性または女性）" }
];

let currentQuiz = [];
let selectedAnswers = {};

function shuffle(array) {
    return [...array].sort(() => Math.random() - 0.5);
}

function chooseAnswer(id, value, btn) {
    selectedAnswers[id] = value;
    document.querySelectorAll(`[data-id='${id}']`)
        .forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");
}

function toggleChoices(id) {
    const div = document.getElementById(id);
    div.style.display = div.style.display === "none" ? "block" : "none";
}

function generateQuiz() {
    const form = document.getElementById("quizForm");
    const result = document.getElementById("result");
    form.innerHTML = "";
    result.innerHTML = "";
    currentQuiz = [];
    selectedAnswers = {};

    /* ---------- 問題1 ---------- */
    form.innerHTML += "<h3>1. アルファベットの読み方を答えてください。（5問）</h3>";
    shuffle(alphabetQuestions).slice(0,5).forEach((q,i)=>{
        currentQuiz.push({type:"text",answer:q.answer});
        form.innerHTML += `
            <div class="question">
                (${i+1}) ${q.letter}
                <input type="text" id="q${currentQuiz.length-1}">
            </div>`;
    });

    /* ---------- 問題2(1) ---------- */
    form.innerHTML += "<h3>2.(1) 二重母音・三重母音を含まない単語を選びなさい。</h3>";
    const dip = shuffle(noDiphthongQuestions)[0];
    currentQuiz.push({type:"choice",answer:dip.correct});
    form.innerHTML += `<div class="question">`;
    dip.options.forEach(opt=>{
        form.innerHTML += `
            <button type="button" class="choice-btn"
                data-id="q${currentQuiz.length-1}"
                onclick="chooseAnswer('q${currentQuiz.length-1}','${opt}',this)">
                ${opt}
            </button>`;
    });
    form.innerHTML += `</div>`;

    /* ---------- 問題2(2) ---------- */
    form.innerHTML += "<h3>2.(2) 二重子音を含まない単語を選びなさい。</h3>";
    const clu = shuffle(noClusterQuestions)[0];
    currentQuiz.push({type:"choice",answer:clu.correct});
    form.innerHTML += `<div class="question">`;
    clu.options.forEach(opt=>{
        form.innerHTML += `
            <button type="button" class="choice-btn"
                data-id="q${currentQuiz.length-1}"
                onclick="chooseAnswer('q${currentQuiz.length-1}','${opt}',this)">
                ${opt}
            </button>`;
    });
    form.innerHTML += `</div>`;

    /* ---------- 問題3 ---------- */
    form.innerHTML += "<h3>3. 次のスペイン語の挨拶表現を和訳してください。（3問）</h3>";
    shuffle(greetingQuestions).slice(0,3).forEach((q,i)=>{
        const options = shuffle(greetingQuestions.map(g=>g.answer))
                        .filter(a=>a!==q.answer)
                        .slice(0,3);
        options.push(q.answer);
        shuffle(options);

        currentQuiz.push({type:"choice",answer:q.answer});
        const id = `choices${i}`;
        form.innerHTML += `
            <div class="question">
                (${i+1}) ${q.spanish}<br>
                <button type="button" onclick="toggleChoices('${id}')">
                    選択肢を表示
                </button>
                <div id="${id}" style="display:none;">
                    ${options.map(opt=>`
                        <button type="button" class="choice-btn"
                            data-id="q${currentQuiz.length-1}"
                            onclick="chooseAnswer('q${currentQuiz.length-1}','${opt}',this)">
                            ${opt}
                        </button>
                    `).join("")}
                </div>
            </div>`;
    });
}

function gradeQuiz() {
    let score = 0;
    let feedback = "<h3>採点結果</h3>";

    currentQuiz.forEach((q,i)=>{
        let userAnswer;
        if(q.type==="text"){
            userAnswer=document.getElementById(`q${i}`).value.trim().toLowerCase();
        }else{
            userAnswer=(selectedAnswers[`q${i}`]||"").toLowerCase();
        }
        const correct=q.answer.toLowerCase();
        const ok=userAnswer===correct;
        if(ok) score++;

        feedback+=`<p class="${ok?"correct":"incorrect"}">
            問題${i+1}: ${ok?"正解":`不正解（正答: ${q.answer}）`}
        </p>`;
    });

    feedback+=`<p>得点: ${score} / ${currentQuiz.length}</p>`;
    document.getElementById("result").innerHTML=feedback;
}
</script>
</body>
</html>
