        let currentQuiz = [];

        function shuffle(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function generateQuiz() {
            const form = document.getElementById("quizForm");
            const result = document.getElementById("result");
            form.innerHTML = "";
            result.innerHTML = "";
            currentQuiz = [];

            // 第1問
            const defQs = shuffle([...definiteArticles]).slice(0, 2);
            form.innerHTML += "<h3>1. 以下の名詞に適切な定冠詞をつけてください。（1×2）</h3>";
            defQs.forEach((q, i) => {
                currentQuiz.push(q.answer.toLowerCase());
                form.innerHTML += `
                    <div class="question">
                        (${i + 1}) ${q.noun}
                        <input type="text" id="q${currentQuiz.length - 1}">
                    </div>`;
            });

            // 第2問
            const indefQs = shuffle([...indefiniteArticles]).slice(0, 2);
            form.innerHTML += "<h3>2. 以下の名詞に適切な不定冠詞をつけてください。（1×2）</h3>";
            indefQs.forEach((q, i) => {
                currentQuiz.push(q.answer.toLowerCase());
                form.innerHTML += `
                    <div class="question">
                        (${i + 1}) ${q.noun}
                        <input type="text" id="q${currentQuiz.length - 1}">
                    </div>`;
            });

            // 第3問
            const fillQs = shuffle([...fillInTheBlanks]).slice(0, 6);
            form.innerHTML += "<h3>3. 以下のかっこ内に、和訳に合うように適語を入れてください。（1×6）</h3>";
            fillQs.forEach((q, i) => {
                currentQuiz.push(q.answer.toLowerCase());
                const jp = translations[q.question] || "";
                form.innerHTML += `
                    <div class="question">
                        (${i + 1}) ${q.question}
                        <span class="translation">（和訳：${jp}）</span>
                        <input type="text" id="q${currentQuiz.length - 1}">
                    </div>`;
            });

            if (showTranslations) toggleTranslations();
        }

        function gradeQuiz() {
            let score = 0;
            let feedback = "<h3>採点結果</h3>";

            currentQuiz.forEach((answer, i) => {
                const inputElement = document.getElementById(`q${i}`);
                if (!inputElement) return;

                const userInput = inputElement.value.trim().toLowerCase();
                const correct = userInput === answer;

                if (correct) score++;

                feedback += `
                    <p class="${correct ? "correct" : "incorrect"}">
                        問題${i + 1}:
                        ${correct ? "正解" : `不正解（正答: ${answer}）`}
                    </p>`;
            });

            feedback += `<p>得点: ${score} / ${currentQuiz.length}</p>`;
            document.getElementById("result").innerHTML = feedback;
        }
