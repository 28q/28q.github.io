<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<title>スペイン語 1-2 演習</title>
<style>
body { font-family: Arial; margin:40px; line-height:1.8; }
h1{text-align:center;}
button{padding:10px 20px;margin:5px;font-size:16px;cursor:pointer;}
input{margin-left:10px;padding:5px;font-size:16px;width:200px;}
.question{margin-bottom:15px;}
.correct{color:green;} .incorrect{color:red;}
#result{margin-top:20px;font-weight:bold;}
.translation{display:none;color:#555;margin-left:10px;}

<body>
<h1>スペイン語 1-2 演習</h1>

<button onclick="generateQuiz()">問題生成</button>
<button onclick="toggleTranslations()" id="toggleBtn">答え表示</button>

<form id="quizForm"></form>
<button onclick="gradeQuiz()">採点</button>
<div id="result"></div>
<button onclick="resetHistory()">履歴リセット</button>
<canvas id="chart" height="200"></canvas>

<script>
let show=false;
let current=[];
let history = JSON.parse(localStorage.getItem('scoreHistory') || '[]');
let chart;

function drawChart(){
 const ctx=document.getElementById('chart');
 if(!ctx) return;
 if(chart) chart.destroy();
 chart=new Chart(ctx,{
  type:'line',
  data:{
   labels:history.map((_,i)=>`回${i+1}`),
   datasets:[{label:'得点(%)',data:history,fill:false}]
  },
  options:{
    responsive:true,
    scales:{
      y:{
        min:0,
        max:100,
        ticks:{ stepSize:20 }
      }
    }
  }
 });
}

function toggleTranslations(){
 show=!show;
 document.querySelectorAll('.translation').forEach(e=>e.style.display=show?'inline':'none');
 document.getElementById('toggleBtn').textContent=show?'答え非表示':'答え表示';
}

function shuffle(array){
 const result=[...array];
 for(let i=result.length-1;i>0;i--){
  const j=Math.floor(Math.random()*(i+1));
  [result[i],result[j]]=[result[j],result[i]];
 }
 return result;
}

function norm(s){
 return s.toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
}

 {q:'___ profesor es amable.（彼らの先生）',a:'su'},
 {q:'___ amigos son buenos.（君たちの友達）',a:'vuestros'},
 {q:'___ hermana es alta.（私の姉）',a:'mi'},
 {q:'___ casas son nuevas.（彼らの家）',a:'sus'},

 {q:'___ libros son difíciles.（彼の本）',a:'sus'},

 {q:'___ casa está aquí.（君たちの家）',a:'vuestra'},
 // 前置形の不足分補完
{q:'___ casas son grandes.（私たちの家）',a:'nuestras'},
{q:'___ libros son interesantes.（君たちの本）',a:'vuestros'},
{q:'___ casas son bonitas.（君たちの家）',a:'vuestras'},
 // 後置形（完全網羅）
 /*
{q:'Este es el libro ___.（これは私の本です）',a:'mío'},
{q:'Esta es la casa ___.（これは私の家です）',a:'mía'},
{q:'Estos son los libros ___.（これらは私の本です）',a:'míos'},
{q:'Estas son las casas ___.（これらは私の家です）',a:'mías'},

{q:'Este es el libro ___.（これは君の本です）',a:'tuyo'},

{q:'Estos son los libros ___.（これらは君の本です）',a:'tuyos'},

{q:'Estas son las casas ___.（これらは彼の家です）',a:'suyas'},

{q:'Este es el libro ___.（これは私たちの本です）',a:'nuestro'},

{q:'Este es el libro ___.（これは君たちの本です）',a:'vuestro'},

{q:'Estas son las casas ___.（これらは君たちの家です）',a:'vuestras'}
*/

const haberEstar=[

const donde=[
 {jp:'駅はどこですか？',a:'¿Dónde está la estación?',v:'estación'},
 {jp:'その本はどこですか？',a:'¿Dónde está el libro?',v:'libro'},
 {jp:'あなたの家はどこですか？',a:'¿Dónde está tu casa?',v:'casa'},

 {jp:'その町はどんなですか？',a:'¿Cómo es la ciudad?',v:'ciudad'},
 {jp:'その先生はどんな人ですか？',a:'¿Cómo es el profesor?',v:'profesor'},
 {jp:'その本はどうですか？',a:'¿Cómo es el libro?',v:'libro'},
 {jp:'そのレストランはどうですか？',a:'¿Cómo es el restaurante?',v:'restaurante'},
 {jp:'そのホテルはどうですか？',a:'¿Cómo es el hotel?',v:'hotel'},
 {jp:'その公園はどんなですか？',a:'¿Cómo es el parque?',v:'parque'}
];

function generateQuiz(){
 const form=document.getElementById('quizForm');
 const res=document.getElementById('result');
 form.innerHTML=''; res.innerHTML=''; current=[];

 //1
 form.innerHTML+='<h3>1. 所有詞 1×3</h3>';
 shuffle(poss).slice(0,3).forEach((x,i)=>{
  current.push(x.a);
  form.innerHTML+=`<div class='question'>(${i+1}) ${x.q.replace('___','(　)')}<input id='q${current.length-1}'></div>`;
 });

 //2
 form.innerHTML+='<h3>2. haber / estar 1×3</h3>';
 shuffle(haberEstar).slice(0,3).forEach((x,i)=>{
  current.push(x.a);
  form.innerHTML+=`<div class='question'>(${i+1}) ${x.q.replace('___','(　)')}<input id='q${current.length-1}'></div>`;
 });

 //3
 const w=shuffle(donde)[0];
 const c=shuffle(como)[0];
 const arr=shuffle([w,c]);

 form.innerHTML+='<h3>3. 和文→西文 2×2</h3>';
 arr.forEach((x,i)=>{
  current.push(x.a);
  form.innerHTML+=`<div class='question'>(${i+1}) ${x.jp}
  <span class='translation'>（${x.a}）</span>
  <div class='wordbox'>語彙: ${x.v}</div>
  <input id='q${current.length-1}'></div>`;
 });
}

function gradeQuiz(){
 let score=0; let out='';
 current.forEach((a,i)=>{
  const v=norm(document.getElementById('q'+i).value);
  const ok=v===norm(a);
  if(ok)score++;
  out+=`<p class='${ok?'correct':'incorrect'}'>${i+1}: ${ok?'〇':'× '+a}</p>`;
 });

 const total=current.length;
 const percent=Math.round((score/total)*100);

 // 履歴保存（直近5回）
 history.push(percent);
 if(history.length>5) history.shift();
 localStorage.setItem('scoreHistory',JSON.stringify(history));

 const avg = Math.round(history.reduce((a,b)=>a+b,0)/history.length);

 out+=`<p>${score}/${total} (${percent}%)</p>`;
 out+=`<p>直近${history.length}回の平均: ${avg}%</p>`;
 drawChart();

 document.getElementById('result').innerHTML=out;
}

function resetHistory(){
 history=[];
 localStorage.removeItem('scoreHistory');
 drawChart();
 document.getElementById('result').innerHTML='履歴をリセットしました';
}

// Chart.js読み込み
document.write('<script src="https://cdn.jsdelivr.net/npm/chart.js"><\/script>');

generateQuiz();
</script>
